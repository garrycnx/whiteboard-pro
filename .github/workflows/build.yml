name: Build WhiteBoard Pro EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run build

      - name: Upload EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: WhiteBoard-Pro-Windows-Installer
          path: dist/*.exe
          retention-days: 30
