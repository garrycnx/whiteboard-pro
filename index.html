<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WhiteBoard Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;}
body{width:100vw;height:100vh;overflow:hidden;background:#f0f1f5;font-family:'Segoe UI',system-ui,sans-serif;}

/* ─── CANVAS STACK ─── */
#canvas-wrap{position:fixed;inset:0;}
#canvas-bg{position:absolute;inset:0;}   /* grid */
#canvas-main{position:absolute;inset:0;} /* committed strokes */
#canvas-tmp{position:absolute;inset:0;}  /* in-progress stroke preview */
#obj-layer{position:absolute;inset:0;pointer-events:none;}
#obj-layer.selectable{pointer-events:all;}

/* ─── OBJECTS ─── */
.wbo{
  position:absolute;box-sizing:border-box;
  pointer-events:all;
}
.wbo.sel{outline:2px solid #4262ff;outline-offset:1px;}
.handle{
  position:absolute;width:11px;height:11px;background:#fff;
  border:2px solid #4262ff;border-radius:2px;z-index:20;
  cursor:se-resize;display:none;
}
.wbo.sel .handle{display:block;}
.rot-handle{
  position:absolute;width:20px;height:20px;background:#fff;
  border:2px solid #4262ff;border-radius:50%;z-index:20;
  top:-30px;left:calc(50% - 10px);cursor:grab;
  display:none;align-items:center;justify-content:center;font-size:13px;color:#4262ff;
}
.wbo.sel .rot-handle{display:flex;}
.del-handle{
  position:absolute;width:20px;height:20px;background:#ff4d4d;
  border:none;border-radius:50%;z-index:20;top:-30px;right:-6px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  font-size:14px;color:#fff;font-weight:700;line-height:1;
}
.wbo.sel .del-handle{display:flex;}

/* sticky */
.sticky-body{
  width:100%;height:100%;border-radius:3px 3px 3px 0;
  box-shadow:2px 4px 14px rgba(0,0,0,.16);padding:14px;
  display:flex;flex-direction:column;
}
.sticky-ta{
  flex:1;background:transparent;border:none;outline:none;resize:none;
  font-size:14px;line-height:1.55;color:#1e2030;font-family:inherit;
  -webkit-user-select:text;user-select:text;cursor:text;
}
.sticky-fold{
  position:absolute;bottom:0;left:0;width:0;height:0;
  border:7px solid transparent;border-bottom-color:rgba(0,0,0,.18);
  border-left-color:rgba(0,0,0,.18);
}

/* text */
.text-div{
  outline:none;min-width:60px;min-height:24px;
  padding:3px 6px;white-space:pre-wrap;word-break:break-word;
  line-height:1.4;-webkit-user-select:text;user-select:text;cursor:text;
  border:1.5px dashed transparent;
}
.wbo.sel .text-div{border-color:#4262ff55;}

/* ─── RUBBER BAND ─── */
#band{
  position:fixed;border:1.5px dashed #4262ff;
  background:rgba(66,98,255,.06);pointer-events:none;display:none;z-index:60;
}

/* ─── LEFT TOOLBAR ─── */
#ltb{
  position:fixed;left:12px;top:50%;transform:translateY(-50%);
  background:#fff;border:1px solid #e3e5ec;border-radius:14px;
  box-shadow:0 2px 16px rgba(0,0,0,.1);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 6px;gap:3px;z-index:200;
}
/* ─── TOP TOOLBAR ─── */
#ttb{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:#fff;border:1px solid #e3e5ec;border-radius:14px;
  box-shadow:0 2px 16px rgba(0,0,0,.1);
  display:flex;align-items:center;padding:5px 8px;gap:2px;z-index:200;
}
/* ─── RIGHT PANEL ─── */
#rpanel{
  position:fixed;right:12px;top:50%;transform:translateY(-50%);
  background:#fff;border:1px solid #e3e5ec;border-radius:14px;
  box-shadow:0 2px 16px rgba(0,0,0,.1);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 8px;gap:7px;z-index:200;min-width:54px;
}
/* ─── BOTTOM ─── */
#bbar{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  background:#fff;border:1px solid #e3e5ec;border-radius:8px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  padding:5px 14px;font-size:12px;color:#8b90a7;z-index:200;
  display:flex;align-items:center;gap:8px;
}
#bbar b{color:#1e2030;}
#zbar{
  position:fixed;bottom:12px;right:12px;
  background:#fff;border:1px solid #e3e5ec;border-radius:8px;
  box-shadow:0 2px 12px rgba(0,0,0,.08);
  display:flex;align-items:center;gap:2px;padding:4px 6px;z-index:200;
}

/* ─── BUTTONS ─── */
.btn{
  width:38px;height:38px;border:none;background:transparent;
  border-radius:8px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;color:#1e2030;transition:all .12s;
  position:relative;flex-shrink:0;
}
.btn:hover{background:#f0f2ff;}
.btn.on{background:#e6eaff;color:#4262ff;outline:1.5px solid #4262ff;}
.btn svg{pointer-events:none;}
/* tooltips */
#ltb .btn[title]:hover::after{
  content:attr(title);position:absolute;left:calc(100% + 8px);top:50%;
  transform:translateY(-50%);background:#1a1d2e;color:#fff;
  font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:999;
}
#ttb .btn[title]:hover::after{
  content:attr(title);position:absolute;top:calc(100% + 8px);left:50%;
  transform:translateX(-50%);background:#1a1d2e;color:#fff;
  font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:999;
}
.zbtn{
  width:28px;height:28px;border:none;background:transparent;
  border-radius:6px;cursor:pointer;font-size:18px;color:#1e2030;
  display:flex;align-items:center;justify-content:center;
}
.zbtn:hover{background:#f0f2ff;}
#zpct{font-size:12px;font-weight:700;color:#1e2030;min-width:44px;text-align:center;cursor:pointer;}
#zpct:hover{background:#f0f2ff;border-radius:4px;}
.sep{background:#e3e5ec;}
.sep.v{width:1px;height:26px;margin:0 3px;}
.sep.h{height:1px;width:28px;margin:3px 0;}

/* ─── COLOR DOTS ─── */
.cdot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:2.5px solid transparent;transition:all .12s;flex-shrink:0;
}
.cdot:hover{transform:scale(1.18);}
.cdot.on{border-color:#1e2030;box-shadow:0 0 0 2px white inset;}
#cur-cdot{width:32px;height:32px;cursor:pointer;}

/* ─── SIZE SLIDER (vertical) ─── */
input.vs{
  writing-mode:vertical-lr;direction:rtl;
  -webkit-appearance:none;appearance:none;
  width:6px;height:90px;background:transparent;cursor:pointer;
}
input.vs::-webkit-slider-runnable-track{
  background:linear-gradient(to top,#4262ff var(--p,40%),#e3e5ec var(--p,40%));
  border-radius:3px;width:6px;
}
input.vs::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;background:#fff;
  border:2px solid #4262ff;border-radius:50%;margin-left:-5px;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
#sdot{background:#1e2030;border-radius:50%;transition:all .12s;}
.plbl{font-size:9px;font-weight:700;color:#8b90a7;text-transform:uppercase;letter-spacing:.5px;}
.pval{font-size:10px;font-weight:700;color:#8b90a7;}

/* ─── POPUPS ─── */
.pop{
  position:fixed;background:#fff;border:1px solid #e3e5ec;
  border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.14);
  padding:12px;z-index:600;display:none;
}
.pop.open{display:block;}
.pop-title{font-size:10px;font-weight:700;color:#8b90a7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
/* color grid */
.cgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px;margin-bottom:8px;}
.cpx{width:22px;height:22px;border-radius:5px;cursor:pointer;border:1.5px solid rgba(0,0,0,.07);transition:transform .12s;}
.cpx:hover{transform:scale(1.25);border-color:#666;}
/* shape btns */
.spop{display:flex;flex-wrap:wrap;gap:5px;}
.sbtn{
  width:40px;height:40px;border:1.5px solid #e3e5ec;border-radius:8px;
  background:#fff;cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-size:20px;transition:all .12s;
}
.sbtn:hover,.sbtn.on{background:#e6eaff;border-color:#4262ff;}

/* ─── CONTEXT MENU ─── */
#ctx{
  position:fixed;background:#fff;border:1px solid #e3e5ec;
  border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.14);
  padding:5px;z-index:800;display:none;min-width:165px;
}
#ctx.open{display:block;}
.citem{padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;color:#1e2030;display:flex;align-items:center;gap:8px;}
.citem:hover{background:#f0f2ff;}
.citem.red{color:#ff4d4d;}
.citem.red:hover{background:#fff0f0;}
.csep{height:1px;background:#e3e5ec;margin:4px 0;}

/* ─── TEXT FORMAT BAR ─── */
#fmtbar{
  position:fixed;background:#fff;border:1px solid #e3e5ec;
  border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.12);
  padding:6px 10px;z-index:700;display:none;
  flex-direction:row;align-items:center;gap:6px;flex-wrap:wrap;
}
#fmtbar.open{display:flex;}
#ff-sel{height:28px;border:1px solid #e3e5ec;border-radius:6px;font-size:12px;padding:0 6px;color:#1e2030;cursor:pointer;}
#fs-inp{width:50px;height:28px;border:1px solid #e3e5ec;border-radius:6px;text-align:center;font-size:13px;font-weight:700;}
.fb{width:28px;height:28px;border:1px solid #e3e5ec;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.fb:hover,.fb.on{background:#e6eaff;border-color:#4262ff;color:#4262ff;}

/* ─── TOAST ─── */
#toast{
  position:fixed;top:74px;left:50%;transform:translateX(-50%) translateY(-8px);
  background:#1a1d2e;color:#fff;padding:6px 16px;border-radius:8px;
  font-size:12px;font-weight:600;z-index:900;opacity:0;
  transition:all .25s;pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ─── LASER ─── */
#laser{
  position:fixed;pointer-events:none;z-index:950;display:none;
  width:18px;height:18px;border-radius:50%;transform:translate(-50%,-50%);
  background:radial-gradient(circle,#ff2d55 0%,rgba(255,45,85,.35) 60%,transparent 100%);
}
</style>
</head>
<body>

<!-- CANVAS STACK -->
<div id="canvas-wrap">
  <canvas id="canvas-bg"></canvas>
  <canvas id="canvas-main"></canvas>
  <canvas id="canvas-tmp"></canvas>
  <div id="obj-layer"></div>
</div>

<!-- rubber-band -->
<div id="band"></div>
<!-- laser -->
<div id="laser"></div>

<!-- ═══ LEFT TOOLBAR ═══ -->
<div id="ltb">
  <button class="btn on" data-t="select" title="Select (V)">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M4 2l16 10-7 1.5-3.5 7z"/></svg>
  </button>
  <div class="sep h"></div>
  <button class="btn" data-t="pen" title="Pen (P)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z"/></svg>
  </button>
  <button class="btn" data-t="marker" title="Marker (M)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><rect x="6" y="3" width="12" height="8" rx="1"/><path d="M9 11l-1 9 4-2.5 4 2.5-1-9"/></svg>
  </button>
  <button class="btn" data-t="eraser" title="Eraser (E)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 20H7L3 16l11-11 6 6z"/><path d="M6 17l5-5"/></svg>
  </button>
  <div class="sep h"></div>
  <button class="btn" data-t="sticky" title="Sticky Note (N)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h8l6-6V4a2 2 0 00-2-2z"/><polyline points="14 2 14 8 20 8"/></svg>
  </button>
  <button class="btn" data-t="text" title="Text (T)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
  </button>
  <button class="btn" data-t="shape" title="Shapes (S)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><circle cx="17.5" cy="6.5" r="3.5"/><path d="M12 21l4-7H8z"/></svg>
  </button>
  <button class="btn" data-t="arrow" title="Arrow / Line (A)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="13 5 19 5 19 11"/></svg>
  </button>
  <button class="btn" data-t="image" title="Image (I)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
  </button>
  <div class="sep h"></div>
  <button class="btn" data-t="pan" title="Pan (Space)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>
  </button>
  <button class="btn" data-t="laser" title="Laser (L)">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" fill="currentColor" opacity=".3"/><line x1="12" y1="3" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="21"/><line x1="3" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="21" y2="12"/></svg>
  </button>
</div>

<!-- ═══ TOP TOOLBAR ═══ -->
<div id="ttb">
  <button class="btn" id="b-undo" title="Undo (Ctrl+Z)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg></button>
  <button class="btn" id="b-redo" title="Redo (Ctrl+Y)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg></button>
  <div class="sep v"></div>
  <button class="btn" id="b-copy" title="Copy (Ctrl+C)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
  <button class="btn" id="b-paste" title="Paste (Ctrl+V)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></button>
  <button class="btn" id="b-dup" title="Duplicate (Ctrl+D)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="8" y="8" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
  <button class="btn" id="b-del" title="Delete (Del)"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
  <div class="sep v"></div>
  <button class="btn" id="b-front" title="Bring Forward"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="1"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/><line x1="17" y1="2" x2="17" y2="6"/><line x1="15" y1="4" x2="19" y2="4"/></svg></button>
  <button class="btn" id="b-back" title="Send Backward"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="13" height="13" rx="1"/><path d="M19 9h1a2 2 0 012 2v9a2 2 0 01-2 2H10a2 2 0 01-2-2v-1"/></svg></button>
  <div class="sep v"></div>
  <button class="btn" id="b-fmt" title="Text Format"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg></button>
  <div class="sep v"></div>
  <button class="btn" id="b-grid" title="Toggle Grid"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
  <button class="btn" id="b-fit" title="Fit Screen"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
  <div class="sep v"></div>
  <button class="btn" id="b-export" title="Export PNG"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
  <button class="btn" id="b-clear" title="Clear Board"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
</div>

<!-- ═══ RIGHT PANEL ═══ -->
<div id="rpanel">
  <div class="plbl">Color</div>
  <div id="cur-cdot" class="cdot on" style="background:#1e2030" onclick="openColorPop(event)"></div>
  <div class="cdot" style="background:#1e2030" onclick="setColor('#1e2030')"></div>
  <div class="cdot" style="background:#ff4d4d" onclick="setColor('#ff4d4d')"></div>
  <div class="cdot" style="background:#ff9f0a" onclick="setColor('#ff9f0a')"></div>
  <div class="cdot" style="background:#34c759" onclick="setColor('#34c759')"></div>
  <div class="cdot" style="background:#4262ff" onclick="setColor('#4262ff')"></div>
  <div class="cdot" style="background:#bf5af2" onclick="setColor('#bf5af2')"></div>
  <div class="cdot" style="background:#fff;border:1.5px solid #ccc" onclick="setColor('#ffffff')"></div>
  <div class="cdot" style="background:conic-gradient(red,yellow,lime,cyan,blue,magenta,red)" onclick="openColorPop(event)"></div>
  <div class="sep h"></div>
  <div class="plbl">Size</div>
  <div style="width:36px;height:36px;display:flex;align-items:center;justify-content:center"><div id="sdot" style="width:8px;height:8px"></div></div>
  <input type="range" class="vs" id="s-slider" min="1" max="60" value="4" oninput="setSize(+this.value)">
  <div class="pval" id="s-val">4</div>
  <div class="sep h"></div>
  <div class="plbl">Opacity</div>
  <input type="range" class="vs" id="o-slider" min="5" max="100" value="100" oninput="setOpacity(+this.value)">
  <div class="pval" id="o-val">100%</div>
</div>

<!-- ═══ BOTTOM & ZOOM ═══ -->
<div id="bbar">
  <b id="tl-lbl">Select</b> · <span id="xy-lbl">0, 0</span> · Objects: <b id="obj-lbl">0</b>
</div>
<div id="zbar">
  <button class="zbtn" onclick="zoom(-0.12)">−</button>
  <div id="zpct" onclick="resetVP()">100%</div>
  <button class="zbtn" onclick="zoom(0.12)">+</button>
</div>

<!-- ═══ POPUPS ═══ -->
<div id="cpop" class="pop" style="width:230px">

<input type="file" id="img-inp" accept="image/*" style="display:none" onchange="onImgFile(event)">

<script>
// ╔══════════════════════════════════════════════════════════════╗
//  WHITEBOARD PRO v3 — Clean-room rewrite
//  Key fix: All drawing uses a SINGLE coordinate system.
//  The canvas is LARGE (9000×9000). We translate the viewport
//  using CSS transform on the canvas-wrap div — the canvas
//  pixels are NOT transformed. We convert mouse → canvas coords
//  by un-applying the CSS transform.  This gives pixel-perfect
//  pen/eraser drawing that matches exactly where the cursor is.
// ╚══════════════════════════════════════════════════════════════╝

// ─── Canvases ───
const cvBg   = document.getElementById('canvas-bg');
const cvMain = document.getElementById('canvas-main');
const cvTmp  = document.getElementById('canvas-tmp');
const cxBg   = cvBg.getContext('2d');
const cxMain = cvMain.getContext('2d');
const cxTmp  = cvTmp.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');
const objLayer = document.getElementById('obj-layer');

// Canvas size (virtual board size)
const BW = 9000, BH = 9000;

function initCanvases() {
  [cvBg, cvMain, cvTmp].forEach(c => { c.width = BW; c.height = BH; });
}
initCanvases();

// ─── Viewport ───
// We pan/zoom by CSS transform on the wrap div.
// Mouse → board: subtract wrap's CSS translate, then divide by scale.
let vx = 0, vy = 0, vz = 1; // pan x, pan y, zoom scale

function applyVP() {
  wrap.style.transform = `translate(${vx}px,${vy}px) scale(${vz})`;
  wrap.style.transformOrigin = '0 0';
  document.getElementById('zpct').textContent = Math.round(vz*100)+'%';
  drawGrid();
}

// Convert screen (client) coordinates → board pixel coordinates
function s2b(sx, sy) {
  // The wrap is offset from body origin (fixed, so clientX/Y directly)
  return { x: (sx - vx) / vz, y: (sy - vy) / vz };
}

function zoom(delta, cx, cy) {
  const w = window.innerWidth, h = window.innerHeight;
  const ox = cx ?? w/2, oy = cy ?? h/2;
  const prev = vz;
  vz = Math.max(0.1, Math.min(8, vz * (1 + delta)));
  vx = ox - (ox - vx) * (vz / prev);
  vy = oy - (oy - vy) * (vz / prev);
  applyVP();
}
function resetVP() { vx=0; vy=0; vz=1; applyVP(); }

// ─── Grid ───
let showGrid = true;
function drawGrid() {
  cxBg.clearRect(0,0,BW,BH);
  if (!showGrid) return;
  const gs = 32;
  cxBg.strokeStyle = 'rgba(160,165,195,0.28)';
  cxBg.lineWidth = 1;
  for (let x=0;x<BW;x+=gs) { cxBg.beginPath();cxBg.moveTo(x,0);cxBg.lineTo(x,BH);cxBg.stroke(); }
  for (let y=0;y<BH;y+=gs) { cxBg.beginPath();cxBg.moveTo(0,y);cxBg.lineTo(BW,y);cxBg.stroke(); }
}
drawGrid();

// ─── Tool / color / size state ───
let tool = 'select';
let color = '#1e2030';
let size = 4;
let opacity = 1;
let curShape = 'rect';
let curArrow = 'arrow';
let stickyCol = '#fef08a';

// ─── Undo / Redo (image snapshots) ───
let undoStack = [];
let redoStack = [];

function snapshot() {
  const data = cvMain.toDataURL();
  const objs = serializeObjs();
  undoStack.push({data, objs});
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function serializeObjs() {
  return objects.map(o => ({
    id: o.id, type: o.type, x: o.x, y: o.y, w: o.w, h: o.h,
    rot: o.rot, locked: o.locked, zi: o.zi,
    inner: o.el.innerHTML
  }));
}

function undo() {
  if (undoStack.length < 2) { toast('Nothing to undo'); return; }
  redoStack.push(undoStack.pop());
  applySnapshot(undoStack[undoStack.length-1]);
  toast('Undo');
}
function redo() {
  if (!redoStack.length) { toast('Nothing to redo'); return; }
  const s = redoStack.pop();
  undoStack.push(s);
  applySnapshot(s);
  toast('Redo');
}
function applySnapshot(s) {
  const img = new Image();
  img.onload = () => { cxMain.clearRect(0,0,BW,BH); cxMain.drawImage(img,0,0); };
  img.src = s.data;
  // restore objects
  objects.forEach(o => o.el.remove());
  objects = [];
  sel = [];
  s.objs.forEach(od => {
    const el = document.createElement('div');
    el.className = 'wbo';
    el.dataset.id = od.id;
    el.style.cssText = `left:${od.x}px;top:${od.y}px;width:${od.w}px;height:${od.h}px;transform:rotate(${od.rot}deg);z-index:${od.zi};`;
    el.innerHTML = od.inner;
    objLayer.appendChild(el);
    const rec = {id:od.id,el,type:od.type,x:od.x,y:od.y,w:od.w,h:od.h,rot:od.rot,locked:od.locked,zi:od.zi};
    objects.push(rec);
    reHook(rec);
  });
  updateObjCount();
}

// ─── Objects ───
let objects = [];
let sel = [];
let clipboard = [];
let oid = 1;

function nid() { return 'o'+(oid++); }
function getO(id) { return objects.find(o=>o.id===id); }
function delO(id) {
  const o = getO(id); if(!o) return;
  o.el.remove(); objects=objects.filter(x=>x.id!==id);
  sel=sel.filter(x=>x!==id); updateObjCount();
}
function updateObjCount() {
  document.getElementById('obj-lbl').textContent = objects.length;
}
function deselAll() {
  sel.forEach(id=>{ const o=getO(id); if(o) o.el.classList.remove('sel'); });
  sel=[];
}
function addSel(id) {
  if(!sel.includes(id)) sel.push(id);
  const o=getO(id); if(o) o.el.classList.add('sel');
}

// ─── HIT TEST ───
function hitAt(sx, sy) {
  // test in reverse zIndex order (topmost first)
  const sorted = [...objects].sort((a,b)=>b.zi-a.zi);
  for (const o of sorted) {
    // convert board coords to screen for hit testing
    const scr_x = o.x*vz+vx, scr_y = o.y*vz+vy;
    const scr_w = o.w*vz, scr_h = o.h*vz;
    if (sx>=scr_x && sx<=scr_x+scr_w && sy>=scr_y && sy<=scr_y+scr_h) return o;
  }
  return null;
}

// ─── Pointer events ───
let drawing=false, panning=false, dragging=false, banding=false, rotating=false, resizing=false;
let pts=[], dragStart={}, bandStart={}, rotStart={}, resizeStart={};
let prevTool=null;

document.addEventListener('keydown', e => {
  if (e.key===' ' && tool!=='pan') { e.preventDefault(); prevTool=tool; setTool('pan'); }
});
document.addEventListener('keyup', e => {
  if (e.key===' ' && prevTool) { setTool(prevTool); prevTool=null; }
});

wrap.addEventListener('pointerdown', onDown, {passive:false});
wrap.addEventListener('pointermove', onMove, {passive:false});
wrap.addEventListener('pointerup', onUp);
wrap.addEventListener('pointerleave', onUp);
wrap.addEventListener('contextmenu', onCtxMenu);
wrap.addEventListener('wheel', onWheel, {passive:false});
wrap.addEventListener('dblclick', onDbl);

function clientXY(e) { return {sx: e.clientX, sy: e.clientY}; }

function onDown(e) {
  if (e.button===1) { startPan(e); return; }
  if (e.button===2) return;
  e.preventDefault();
  wrap.setPointerCapture(e.pointerId);
  closeAll();

  const {sx,sy} = clientXY(e);
  const bp = s2b(sx,sy);

  if (tool==='pan') { startPan(e); return; }
  if (tool==='laser') return;

  if (tool==='select') {
    const hit = hitAt(sx,sy);
    if (hit && !hit.locked) {
      if (!e.shiftKey && !sel.includes(hit.id)) deselAll();
      addSel(hit.id);
      startDrag(e, bp);
    } else if (!hit) {
      deselAll();
      startBand(e);
    }
    return;
  }

  if (tool==='pen'||tool==='marker'||tool==='eraser') {
    snapshot();
    drawing=true;
    pts=[bp];
    const pressure = (e.pressure>0&&e.pressure<=1)?e.pressure:1;
    const lw = tool==='marker' ? size*4 : size*(0.5+pressure*0.5);
    cxMain.globalCompositeOperation = tool==='eraser'?'destination-out':'source-over';
    cxMain.globalAlpha = tool==='marker' ? Math.min(opacity*0.5, 0.6) : opacity;
    cxMain.strokeStyle = tool==='eraser'?'rgba(0,0,0,1)':color;
    cxMain.lineWidth = lw;
    cxMain.lineCap='round'; cxMain.lineJoin='round';
    cxMain.beginPath(); cxMain.moveTo(bp.x,bp.y);
    return;
  }

  if (tool==='shape'||tool==='arrow') {
    snapshot();
    drawing=true;
    dragStart={bp, sx, sy};
    return;
  }

  if (tool==='sticky') {
    snapshot();
    dropSticky(bp);
    return;
  }
  if (tool==='text') {
    snapshot();
    dropText(bp);
    return;
  }
  if (tool==='image') {
    document.getElementById('img-inp').click();
    return;
  }
}

function onMove(e) {
  const {sx,sy} = clientXY(e);
  const bp = s2b(sx,sy);

  // update cursor position display
  document.getElementById('xy-lbl').textContent = `${Math.round(bp.x)}, ${Math.round(bp.y)}`;

  if (tool==='laser') {
    const lz = document.getElementById('laser');
    lz.style.display='block';
    lz.style.left=sx+'px'; lz.style.top=sy+'px';
    return;
  }

  if (panning) { doPan(e); return; }
  if (dragging) { doDrag(e,bp); return; }
  if (rotating) { doRotate(e,bp); return; }
  if (resizing) { doResize(e,bp); return; }
  if (banding) { doBand(e); return; }
  if (!drawing) return;

  if (tool==='pen'||tool==='marker'||tool==='eraser') {
    const pressure = (e.pressure>0&&e.pressure<=1)?e.pressure:1;
    if (tool!=='eraser') {
      const lw = tool==='marker' ? size*4 : size*(0.5+pressure*0.5);
      cxMain.lineWidth = lw;
    }
    cxMain.lineTo(bp.x, bp.y);
    cxMain.stroke();
    cxMain.beginPath(); cxMain.moveTo(bp.x,bp.y);
    pts.push(bp);
    return;
  }

  if (tool==='shape'||tool==='arrow') {
    // preview on tmp canvas
    cxTmp.clearRect(0,0,BW,BH);
    drawShapePreview(cxTmp, dragStart.bp, bp);
  }
}

function onUp(e) {
  if (panning) { panning=false; applyToolCursor(); return; }
  if (dragging) { dragging=false; snapshot(); return; }
  if (rotating) { rotating=false; snapshot(); return; }
  if (resizing) { resizing=false; snapshot(); return; }
  if (banding) { finishBand(); return; }
  if (!drawing) return;
  drawing=false;

  const {sx,sy} = clientXY(e);
  const bp = s2b(sx,sy);

  if (tool==='pen'||tool==='marker'||tool==='eraser') {
    cxMain.globalCompositeOperation='source-over';
    cxMain.globalAlpha=1;
    return;
  }

  if (tool==='shape'||tool==='arrow') {
    cxTmp.clearRect(0,0,BW,BH);
    const dx=Math.abs(bp.x-dragStart.bp.x), dy=Math.abs(bp.y-dragStart.bp.y);
    if (dx>4||dy>4) {
      commitShape(dragStart.bp, bp);
    }
    snapshot();
  }
}

// ─── Pan ───
let panSX=0,panSY=0,panVX=0,panVY=0;
function startPan(e) {
  panning=true;
  panSX=e.clientX; panSY=e.clientY;
  panVX=vx; panVY=vy;
  document.body.style.cursor='grabbing';
}
function doPan(e) {
  vx=panVX+(e.clientX-panSX);
  vy=panVY+(e.clientY-panSY);
  applyVP();
}

// ─── Rubber band selection ───
function startBand(e) {
  banding=true;
  bandStart={sx:e.clientX,sy:e.clientY};
  const b=document.getElementById('band');
  b.style.left=e.clientX+'px'; b.style.top=e.clientY+'px';
  b.style.width='0'; b.style.height='0'; b.style.display='block';
}
function doBand(e) {
  const b=document.getElementById('band');
  const x=Math.min(e.clientX,bandStart.sx), y=Math.min(e.clientY,bandStart.sy);
  const w=Math.abs(e.clientX-bandStart.sx), h=Math.abs(e.clientY-bandStart.sy);
  b.style.left=x+'px'; b.style.top=y+'px'; b.style.width=w+'px'; b.style.height=h+'px';
}
function finishBand() {
  banding=false;
  const b=document.getElementById('band');
  b.style.display='none';
  const br=b.getBoundingClientRect();
  objects.forEach(o => {
    const ox=o.x*vz+vx, oy=o.y*vz+vy, ow=o.w*vz, oh=o.h*vz;
    if (ox<br.right&&ox+ow>br.left&&oy<br.bottom&&oy+oh>br.top) addSel(o.id);
  });
}

// ─── Drag move ───
let dragObjs=[];
function startDrag(e, bp) {
  dragging=true;
  dragObjs=sel.map(id=>{ const o=getO(id); return {id,ox:o.x,oy:o.y}; });
  dragStart={bx:bp.x,by:bp.y};
}
function doDrag(e, bp) {
  const dx=bp.x-dragStart.bx, dy=bp.y-dragStart.by;
  dragObjs.forEach(({id,ox,oy})=>{
    const o=getO(id); if(!o||o.locked)return;
    o.x=ox+dx; o.y=oy+dy;
    o.el.style.left=o.x+'px'; o.el.style.top=o.y+'px';
  });
}

// ─── Rotate ───
function startRotate(e, rec) {
  rotating=true;
  dragStart={id:rec.id};
}
function doRotate(e, bp) {
  const o=getO(dragStart.id); if(!o) return;
  const cx=o.x+o.w/2, cy=o.y+o.h/2;
  const angle=Math.atan2(bp.y-cy, bp.x-cx)*180/Math.PI+90;
  o.rot=angle;
  o.el.style.transform=`rotate(${angle}deg)`;
}

// ─── Resize ───
function startResize(e, rec) {
  resizing=true;
  const bp=s2b(e.clientX,e.clientY);
  dragStart={id:rec.id, bx:bp.x, by:bp.y, ow:rec.w, oh:rec.h};
}
function doResize(e, bp) {
  const o=getO(dragStart.id); if(!o) return;
  o.w=Math.max(40,dragStart.ow+(bp.x-dragStart.bx));
  o.h=Math.max(24,dragStart.oh+(bp.y-dragStart.by));
  o.el.style.width=o.w+'px'; o.el.style.height=o.h+'px';
  // update svg viewBox if shape
  const svg=o.el.querySelector('svg');
  if(svg){ svg.setAttribute('viewBox',`0 0 ${o.w} ${o.h}`); rebuildShape(o); }
}

// ─── Double-click: create text ───
function onDbl(e) {
  if (tool!=='select'&&tool!=='text') return;
  const {sx,sy}=clientXY(e);
  if (hitAt(sx,sy)) return;
  snapshot();
  dropText(s2b(sx,sy));
}

// ─── Wheel zoom / pan ───
function onWheel(e) {
  e.preventDefault();
  if (e.ctrlKey||e.metaKey) {
    zoom(e.deltaY>0?-0.08:0.08, e.clientX, e.clientY);
  } else {
    vx-=e.deltaX; vy-=e.deltaY; applyVP();
  }
}

// ─── Context menu ───
function onCtxMenu(e) {
  e.preventDefault();
  const m=document.getElementById('ctx');
  m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px';
  m.classList.add('open');
}
function ctxDo(a) {
  closeAll();
  ({copy:copyS,paste:pasteS,dup:dupS,front:toFront,back:toBack,lock:lockS,del:deleteS})[a]?.();
}

// ─── Tool cursor ───
function applyToolCursor() {
  const map={
    select:'default',pen:'crosshair',marker:'crosshair',eraser:'cell',
    sticky:'crosshair',text:'text',shape:'crosshair',arrow:'crosshair',
    image:'default',pan:'grab',laser:'none'
  };
  document.body.style.cursor=map[tool]||'default';
  if(tool==='laser') document.getElementById('laser').style.display='block';
  else document.getElementById('laser').style.display='none';
}

// ─── setTool ───
function setTool(t) {
  tool=t;
  document.querySelectorAll('#ltb .btn[data-t]').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.getElementById('tl-lbl').textContent=t.charAt(0).toUpperCase()+t.slice(1);
  applyToolCursor();
  closeAll();
  if(t!=='select') deselAll();
  objLayer.className='obj-layer'+(t==='select'?' selectable':'');

  // show sub-popups
  if(t==='shape') openNear('spop', document.querySelector('[data-t="shape"]'));
  if(t==='arrow') openNear('apop', document.querySelector('[data-t="arrow"]'));
  if(t==='sticky') openNear('stickypop', document.querySelector('[data-t="sticky"]'));
}

document.querySelectorAll('#ltb .btn[data-t]').forEach(b=>{
  b.addEventListener('click',()=>setTool(b.dataset.t));
});

// ─── Color ───
const PALS=['#000000','#1e2030','#374151','#6b7280','#9ca3af','#d1d5db','#f3f4f6','#ffffff',
'#ff4d4d','#ff7675','#ff9f0a','#fbbf24','#34c759','#4ade80','#4262ff','#60a5fa',
'#bf5af2','#e879f9','#f43f5e','#fb7185','#14b8a6','#2dd4bf','#8b5cf6','#a78bfa',
'#d97706','#f59e0b','#065f46','#047857','#1e40af','#1d4ed8','#581c87','#7c3aed'];

(()=>{
  const g=document.getElementById('cgrid');
  PALS.forEach(c=>{
    const d=document.createElement('div');
    d.className='cpx'; d.style.background=c;
    if(c==='#ffffff'||c==='#f3f4f6') d.style.borderColor='#ccc';
    d.onclick=()=>{setColor(c);closeAll();};
    g.appendChild(d);
  });
})();

function setColor(c) {
  color=c;
  document.getElementById('cur-cdot').style.background=c;
  document.getElementById('cc-inp').value=c.length===7?c:'#000000';
  // apply to selected objects
  sel.forEach(id=>{
    const o=getO(id); if(!o) return;
    const ta=o.el.querySelector('textarea,.text-div');
    if(ta) { if(o.type==='text') ta.style.color=c; else ta.style.color=c; }
    const svgEls=o.el.querySelectorAll('[stroke]:not([stroke="none"])');
    svgEls.forEach(el=>{ if(el.getAttribute('stroke')!=='none') el.setAttribute('stroke',c); });
  });
}

// ─── Shape drawing ───
let shapeData={};
function drawShapePreview(cx2d, s, e2) {
  const x=Math.min(s.x,e2.x), y=Math.min(s.y,e2.y);
  const w=Math.abs(e2.x-s.x), h=Math.abs(e2.y-s.y);
  cx2d.save();
  cx2d.strokeStyle=color; cx2d.lineWidth=size; cx2d.globalAlpha=opacity;
  cx2d.setLineDash([]); cx2d.lineCap='round'; cx2d.lineJoin='round';

  if(tool==='shape') {
    drawShapePath(cx2d,curShape,x,y,w,h,s,e2);
  } else {
    // arrow/line
    cx2d.beginPath();
    if(curArrow==='dash') cx2d.setLineDash([8,5]);
    cx2d.moveTo(s.x,s.y); cx2d.lineTo(e2.x,e2.y);
    cx2d.stroke();
    if(curArrow==='arrow'||curArrow==='dbarrow') drawArrow(cx2d,s.x,s.y,e2.x,e2.y,false);
    if(curArrow==='dbarrow') drawArrow(cx2d,e2.x,e2.y,s.x,s.y,false);
  }
  cx2d.restore();
}

function drawShapePath(cx2d,sh,x,y,w,h,s,e2) {
  cx2d.beginPath();
  if(sh==='rect'){cx2d.rect(x,y,w,h);}
  else if(sh==='circle'){cx2d.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2);}
  else if(sh==='tri'){cx2d.moveTo(x+w/2,y);cx2d.lineTo(x+w,y+h);cx2d.lineTo(x,y+h);cx2d.closePath();}
  else if(sh==='diamond'){cx2d.moveTo(x+w/2,y);cx2d.lineTo(x+w,y+h/2);cx2d.lineTo(x+w/2,y+h);cx2d.lineTo(x,y+h/2);cx2d.closePath();}
  else if(sh==='star'){
    for(let i=0;i<10;i++){
      const r=i%2===0?Math.min(w,h)/2:Math.min(w,h)/4;
      const a=(i*Math.PI/5)-Math.PI/2;
      i===0?cx2d.moveTo(x+w/2+r*Math.cos(a),y+h/2+r*Math.sin(a)):cx2d.lineTo(x+w/2+r*Math.cos(a),y+h/2+r*Math.sin(a));
    }
    cx2d.closePath();
  } else if(sh==='bubble'){
    const bw=w,bh=h;
    cx2d.moveTo(x+14,y);
    cx2d.quadraticCurveTo(x,y,x,y+bh*.4);
    cx2d.quadraticCurveTo(x,y+bh*.8,x+bw*.3,y+bh*.8);
    cx2d.lineTo(x+bw*.2,y+bh);
    cx2d.lineTo(x+bw*.45,y+bh*.8);
    cx2d.quadraticCurveTo(x+bw,y+bh*.8,x+bw,y+bh*.4);
    cx2d.quadraticCurveTo(x+bw,y,x+bw-14,y);
    cx2d.closePath();
  }
  cx2d.stroke();
}

function drawArrow(cx2d,x1,y1,x2,y2,fill=false) {
  const angle=Math.atan2(y2-y1,x2-x1);
  const hs=Math.max(size*3+8,14);
  cx2d.save();
  cx2d.beginPath();
  cx2d.moveTo(x2,y2);
  cx2d.lineTo(x2-hs*Math.cos(angle-0.42),y2-hs*Math.sin(angle-0.42));
  cx2d.lineTo(x2-hs*Math.cos(angle+0.42),y2-hs*Math.sin(angle+0.42));
  cx2d.closePath();
  cx2d.fillStyle=color;
  cx2d.fill();
  cx2d.restore();
}

function commitShape(s,e2) {
  const x=Math.min(s.x,e2.x),y=Math.min(s.y,e2.y);
  const w=Math.abs(e2.x-s.x),h=Math.abs(e2.y-s.y);
  // Commit to main canvas
  cxMain.save();
  cxMain.strokeStyle=color; cxMain.lineWidth=size; cxMain.globalAlpha=opacity;
  cxMain.setLineDash([]); cxMain.lineCap='round'; cxMain.lineJoin='round';

  if(tool==='shape') {
    drawShapePath(cxMain,curShape,x,y,w,h,s,e2);
  } else {
    if(curArrow==='dash') cxMain.setLineDash([8,5]);
    cxMain.beginPath(); cxMain.moveTo(s.x,s.y); cxMain.lineTo(e2.x,e2.y); cxMain.stroke();
    if(curArrow==='arrow'||curArrow==='dbarrow') drawArrow(cxMain,s.x,s.y,e2.x,e2.y);
    if(curArrow==='dbarrow') drawArrow(cxMain,e2.x,e2.y,s.x,s.y);
  }
  cxMain.restore();
}

// ─── Sticky notes ───
function dropSticky(bp, text='', col) {
  const id=nid();
  const c=col||stickyCol;
  const el=document.createElement('div');
  el.className='wbo'; el.dataset.id=id;
  el.style.cssText=`left:${bp.x}px;top:${bp.y}px;width:200px;height:160px;z-index:${objects.length+1};transform:rotate(0deg);`;
  el.innerHTML=`
    <div class="sticky-body" style="background:${c}">
      <textarea class="sticky-ta" placeholder="Type here...">${text}</textarea>
      <div class="sticky-fold"></div>
    </div>
    <div class="handle" style="bottom:-6px;right:-6px"></div>
    <div class="rot-handle">↻</div>
    <button class="del-handle" onclick="event.stopPropagation();snapshot();delO('${id}');updateObjCount()">×</button>
  `;
  objLayer.appendChild(el);
  const ta=el.querySelector('textarea');
  ta.addEventListener('pointerdown',e=>e.stopPropagation());
  const rec={id,el,type:'sticky',x:bp.x,y:bp.y,w:200,h:160,rot:0,locked:false,zi:objects.length+1};
  objects.push(rec);
  hookObj(rec);
  deselAll(); addSel(id);
  ta.focus();
  updateObjCount();
}

// ─── Text objects ───
function dropText(bp, text='', opts={}) {
  const id=nid();
  const el=document.createElement('div');
  el.className='wbo text-obj-wrap'; el.dataset.id=id;
  const fs=opts.fs||18, ff=opts.ff||'Segoe UI, sans-serif', fc=opts.fc||color;
  el.style.cssText=`left:${bp.x}px;top:${bp.y}px;min-width:80px;min-height:28px;z-index:${objects.length+1};transform:rotate(0deg);`;
  el.innerHTML=`
    <div class="text-div" contenteditable="true"
      style="font-size:${fs}px;font-family:${ff};color:${fc};min-width:80px;min-height:28px">${text}</div>
    <div class="handle" style="bottom:-6px;right:-6px"></div>
    <div class="rot-handle">↻</div>
    <button class="del-handle" onclick="event.stopPropagation();snapshot();delO('${id}');updateObjCount()">×</button>
  `;
  objLayer.appendChild(el);
  const div=el.querySelector('.text-div');
  div.addEventListener('pointerdown',e=>e.stopPropagation());
  div.addEventListener('input',()=>{
    const o=getO(id); if(o){o.w=el.offsetWidth;o.h=el.offsetHeight;}
  });
  const rec={id,el,type:'text',x:bp.x,y:bp.y,w:80,h:28,rot:0,locked:false,zi:objects.length+1};
  objects.push(rec);
  hookObj(rec);
  deselAll(); addSel(id);
  div.focus();
  // cursor to end
  const range=document.createRange(); const s=window.getSelection();
  range.selectNodeContents(div); range.collapse(false); s.removeAllRanges(); s.addRange(range);
  updateObjCount();
}

// ─── Image objects ───
function dropImage(src, bp, w, h) {
  const id=nid();
  const el=document.createElement('div');
  el.className='wbo img-wrap'; el.dataset.id=id;
  el.style.cssText=`left:${bp.x}px;top:${bp.y}px;width:${w}px;height:${h}px;z-index:${objects.length+1};transform:rotate(0deg);`;
  el.innerHTML=`
    <img src="${src}" style="width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;draggable:false">
    <div class="handle" style="bottom:-6px;right:-6px"></div>
    <div class="rot-handle">↻</div>
    <button class="del-handle" onclick="event.stopPropagation();snapshot();delO('${id}');updateObjCount()">×</button>
  `;
  objLayer.appendChild(el);
  const rec={id,el,type:'image',x:bp.x,y:bp.y,w,h,rot:0,locked:false,zi:objects.length+1};
  objects.push(rec);
  hookObj(rec);
  deselAll(); addSel(id);
  updateObjCount();
}

function onImgFile(e) {
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      snapshot();
      let w=img.width,h=img.height;
      const mw=600,mh=500;
      if(w>mw){h*=mw/w;w=mw;}
      if(h>mh){w*=mh/h;h=mh;}
      const bp=s2b(window.innerWidth/2-w/2,window.innerHeight/2-h/2);
      dropImage(ev.target.result,bp,w,h);
      toast('Image inserted!');
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
  e.target.value='';
  setTool('select');
}

// ─── Hook object pointer events ───
function hookObj(rec) {
  rec.el.addEventListener('pointerdown',e=>{
    if(tool!=='select')return;
    e.stopPropagation();
    if(!rec.locked){
      if(!e.shiftKey&&!sel.includes(rec.id)) deselAll();
      addSel(rec.id);
      startDrag(e, s2b(e.clientX,e.clientY));
    }
  });
  rec.el.addEventListener('dblclick',e=>{
    e.stopPropagation();
    const ed=rec.el.querySelector('textarea,[contenteditable]');
    if(ed) ed.focus();
  });
  // resize handle
  const rz=rec.el.querySelector('.handle');
  if(rz){
    rz.addEventListener('pointerdown',e=>{
      e.stopPropagation(); e.preventDefault();
      wrap.setPointerCapture(e.pointerId);
      startResize(e,rec);
    });
  }
  // rotate handle
  const ro=rec.el.querySelector('.rot-handle');
  if(ro){
    ro.addEventListener('pointerdown',e=>{
      e.stopPropagation(); e.preventDefault();
      wrap.setPointerCapture(e.pointerId);
      startRotate(e,rec);
    });
  }
}

function reHook(rec) { hookObj(rec); }

// ─── Copy / Paste / Duplicate ───
function copyS() {
  clipboard=sel.map(id=>{ const o=getO(id); return o?{...o,html:o.el.outerHTML}:null; }).filter(Boolean);
  toast('Copied!');
}
function pasteS(dx=24,dy=24) {
  if(!clipboard.length)return;
  snapshot(); deselAll();
  clipboard.forEach(c=>{
    if(c.type==='sticky'){
      const ta=document.createElement('div');ta.innerHTML=c.html;
      const txt=ta.querySelector('textarea')?.value||'';
      const col=ta.querySelector('.sticky-body')?.style.background||stickyCol;
      dropSticky({x:c.x+dx,y:c.y+dy},txt,col);
    } else if(c.type==='text'){
      const ta=document.createElement('div');ta.innerHTML=c.html;
      const txt=ta.querySelector('[contenteditable]')?.textContent||'';
      dropText({x:c.x+dx,y:c.y+dy},txt);
    } else if(c.type==='image'){
      const ta=document.createElement('div');ta.innerHTML=c.html;
      const src=ta.querySelector('img')?.src||'';
      dropImage(src,{x:c.x+dx,y:c.y+dy},c.w,c.h);
    }
  });
}
function dupS() { copyS(); pasteS(); toast('Duplicated!'); }

// ─── Z order ───
function toFront() {
  const max=Math.max(0,...objects.map(o=>o.zi));
  sel.forEach(id=>{const o=getO(id);if(o){o.zi=max+1;o.el.style.zIndex=o.zi;}});
}
function toBack() {
  const min=Math.min(0,...objects.map(o=>o.zi));
  sel.forEach(id=>{const o=getO(id);if(o){o.zi=min-1;o.el.style.zIndex=o.zi;}});
}

// ─── Lock ───
function lockS() {
  sel.forEach(id=>{
    const o=getO(id);if(!o)return;
    o.locked=!o.locked;
    o.el.style.outline=o.locked?'2px dashed #ff9f0a':'';
  });
  snapshot();
}

// ─── Delete ───
function deleteS() {
  if(!sel.length)return;
  snapshot(); [...sel].forEach(id=>delO(id)); toast('Deleted');
}

// ─── Text format ───
let fmtState={bold:false,italic:false,underline:false,align:'left'};
function tgl(p){
  fmtState[p]=!fmtState[p];
  document.getElementById('fb-'+p[0]).classList.toggle('on',fmtState[p]);

function talign(a){

  ['l','c','r'].forEach((k,i)=>document.getElementById('fb-a'+k).classList.toggle('on',['left','center','right'][i]===a));

// ─── Keyboard shortcuts ───
document.addEventListener('keydown',e=>{
  const active=document.activeElement;
  const isEdit=active.tagName==='TEXTAREA'||active.contentEditable==='true'||active.tagName==='INPUT';
  if(isEdit&&!e.ctrlKey&&!e.metaKey)return;

  const k=e.key.toLowerCase();
  const ctrl=e.ctrlKey||e.metaKey;

  if(ctrl){
    switch(k){
      case 'z': e.preventDefault(); e.shiftKey?redo():undo(); break;
      case 'y': e.preventDefault(); redo(); break;
      case 'a': e.preventDefault(); deselAll(); objects.forEach(o=>addSel(o.id)); break;
      case 'c': e.preventDefault(); copyS(); break;
      case 'v': e.preventDefault(); pasteS(); break;
      case 'd': e.preventDefault(); dupS(); break;
      case '=': case '+': e.preventDefault(); zoom(0.12); break;
      case '-': e.preventDefault(); zoom(-0.12); break;
      case '0': e.preventDefault(); resetVP(); break;
    }
    return;
  }

  switch(k){
    case 'v': setTool('select'); break;
    case 'p': setTool('pen'); break;
    case 'm': setTool('marker'); break;
    case 'e': setTool('eraser'); break;
    case 'n': setTool('sticky'); break;
    case 't': setTool('text'); break;
    case 's': setTool('shape'); break;
    case 'a': setTool('arrow'); break;
    case 'l': setTool('laser'); break;
    case 'delete': case 'backspace': if(!isEdit) deleteS(); break;
    case 'escape': deselAll(); closeAll(); break;
    case '[': setSize(Math.max(1,size-1)); document.getElementById('s-slider').value=size; break;
    case ']': setSize(Math.min(60,size+1)); document.getElementById('s-slider').value=size; break;
  }
});

// ─── Toast ───
function toast(m) {
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1800);
}
